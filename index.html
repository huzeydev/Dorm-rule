<!DOCTYPE html>
<html>
<head>
<title>Dorm Sleeping Rules</title>

<style>
body{
    background-color:black;
    color:red;
    font-family:Arial;
    text-align:center;
    margin-top:120px;
}

h1{
    font-size:50px;
}

button{
    padding:15px 30px;
    font-size:20px;
    background-color:red;
    color:white;
    border:none;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>Dorm Sleeping Rule</h1>

<h2>Plss don't fart while sleeping in the dorms.</h2>

<p>Respect the 20 other members. The air deserves good smell. and plss controll your fart it ain't a good thing.</p>

<button onclick="sayThanks()">I Promise</button>

<p id="message"></p>

<script>
function sayThanks() {
    // Change message
    document.getElementById("message").innerHTML =
    "On behalf of the dorm, thank you for your cooperation.";

    // Change button color to blue
    const button = document.getElementById("promiseButton");
    button.style.backgroundColor = "blue";

    // Add flash animation
    button.classList.add("flash");

    // Remove the class after animation ends so it can flash again if clicked
    setTimeout(() => {
        button.classList.remove("flash");
    }, 500);
}
</script>

</body>
</html>
